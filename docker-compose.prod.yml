# Production compose for one small ARM VM.
#
# Memory budget for the 2 GB baseline host plus required 4 GB swap:
# caddy 64m, api 1g, worker 1g, neo4j 900m, chroma 400m, postgres 256m,
# redis 128m. These caps sum to about 3.7 GB, so the host survives peak overlap
# by using swap. On a 12 GB Oracle A1 host, operators may raise Neo4j heap /
# pagecache and set USE_RERANKER=true without changing the code or compose shape.

services:
  caddy:
    build:
      context: .
      target: caddy
    image: kgre-caddy:prod
    container_name: kgre-caddy
    restart: unless-stopped
    mem_limit: 64m
    depends_on:
      api:
        condition: service_healthy
    environment:
      # DOMAIN empty -> :80. DOMAIN=example.com -> automatic HTTPS for example.com.
      CADDY_SITE_ADDRESS: "${DOMAIN:-:80}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    image: kgre-api:prod
    container_name: kgre-api
    restart: unless-stopped
    mem_limit: 1g
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      ENV: production
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kgre}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kgre}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      USE_SHARDING: "false"
      USE_RERANKER: ${USE_RERANKER:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 18
      start_period: 30s

  worker:
    image: kgre-api:prod
    container_name: kgre-worker
    restart: unless-stopped
    mem_limit: 1g
    command: rq worker ingestion ingestion_bulk --with-scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      ENV: production
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kgre}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kgre}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      USE_SHARDING: "false"
      USE_RERANKER: ${USE_RERANKER:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "from backend.db.redis import get_sync_client; get_sync_client().ping()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  neo4j:
    image: neo4j:5.18-community
    container_name: kgre-neo4j
    restart: unless-stopped
    mem_limit: 900m
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 384m
      NEO4J_server_memory_pagecache_size: 128m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7474"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  chroma:
    image: chromadb/chroma:1.5.9
    container_name: kgre-chroma
    restart: unless-stopped
    mem_limit: 400m
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8000), 3); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: kgre-postgres
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kgre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kgre}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kgre-redis
    restart: unless-stopped
    mem_limit: 128m
    command: redis-server --save 60 1 --loglevel warning --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  postgres_data:
  redis_data:
