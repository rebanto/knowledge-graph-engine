services:
  neo4j:
    image: neo4j:5.18-community
    container_name: kgre-neo4j
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-kgre_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Phase 4: extra Neo4j shards (opt-in) ──────────────────────────────────────
  # The 'neo4j' service above is shard 0. These add shards 1 and 2. Enable with:
  #   docker compose --profile sharding up -d
  # and set USE_SHARDING=true + NUM_SHARDS=3 in .env. Without the profile the
  # system runs single-node (the default and the fallback per CLAUDE.md).
  neo4j-1:
    image: neo4j:5.18-community
    container_name: kgre-neo4j-1
    profiles: ["sharding"]
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-kgre_dev_password}
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_1_data:/data
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  neo4j-2:
    image: neo4j:5.18-community
    container_name: kgre-neo4j-2
    profiles: ["sharding"]
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-kgre_dev_password}
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_2_data:/data
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  # ── Vector store (ChromaDB server) ───────────────────────────────────────────
  # MUST run as a server, not in-process. The API and the RQ ingestion worker are
  # separate processes; a per-process PersistentClient never sees the other
  # process's writes (worker ingests → API can't retrieve → source shows green
  # "ready" but answers "no information"). One shared server is the single source
  # of truth both connect to via chromadb.HttpClient (see backend/db/chroma.py).
  # Image tag is pinned to match the chromadb client version so the on-disk
  # format is compatible; the existing ./chroma_data is bind-mounted unchanged.
  chroma:
    image: chromadb/chroma:1.5.9
    container_name: kgre-chroma
    ports:
      - "8001:8000"   # host 8001 → container 8000 (8000 is taken by the API)
    volumes:
      - ./chroma_data:/data   # reuse existing on-disk data (persist_path=/data)
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: kgre-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kgre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kgre_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-kgre}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kgre}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kgre-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Worker is run locally in development (see dev.ps1).
  # Enable for production: docker compose --profile production up
  worker:
    build: .
    profiles: ["production"]
    command: rq worker ingestion ingestion_bulk --with-scheduler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kgre}:${POSTGRES_PASSWORD:-kgre_dev_password}@postgres:5432/${POSTGRES_DB:-kgre}
      NEO4J_URI: bolt://neo4j:7687
      # Override .env's localhost:8001 — inside the network it's the chroma service.
      # Without this the worker would use an in-process client the API can't read.
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  # ── Phase 3: distributed worker pool (opt-in) ─────────────────────────────────
  # Replaces the single RQ worker with a coordinator + N workers over gRPC.
  # Enable with: docker compose --profile distributed up -d --scale dworker=3
  # The simple RQ worker (run via dev.ps1) remains the default + fallback.
  coordinator:
    build: .
    container_name: kgre-coordinator
    profiles: ["distributed"]
    command: python -m backend.coordinator.server
    env_file: .env
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_started
    environment:
      COORDINATOR_PORT: "50051"
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kgre}:${POSTGRES_PASSWORD:-kgre_dev_password}@postgres:5432/${POSTGRES_DB:-kgre}
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    restart: unless-stopped

  dworker:
    build: .
    profiles: ["distributed"]
    command: python -m backend.coordinator.worker_client
    env_file: .env
    depends_on:
      - coordinator
      - chroma
    environment:
      COORDINATOR_HOST: coordinator
      COORDINATOR_PORT: "50051"
      REDIS_URL: redis://redis:6379
      POSTGRES_URL: postgresql://${POSTGRES_USER:-kgre}:${POSTGRES_PASSWORD:-kgre_dev_password}@postgres:5432/${POSTGRES_DB:-kgre}
      NEO4J_URI: bolt://neo4j:7687
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_1_data:
  neo4j_2_data:
  postgres_data:
  redis_data:
